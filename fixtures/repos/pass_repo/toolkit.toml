[workspace]
crate_roots = ["crates"]
exclude_crates = []

[checks.proc_macro_scope]
enabled = true
include_paths = ["crates"]
required_markers = ["#[public_model"]
exclude_files = ["crates/traits/src/lib.rs"]

[checks.result_must_use]
enabled = true
include_paths = ["crates/traits/src"]

[checks.test_boundaries]
enabled = true
scan_roots = ["crates"]
exclude_prefixes = []
exclude_path_parts = ["/tests/", "/benches/", "/examples/", "/target/"]

[checks.docs_link_check]
enabled = true
docs_roots = ["docs"]
scratch_dir_prefix = "work/"

[checks.docs_index]
enabled = true
docs_root = "docs"
index_file = "docs/101_introduction.md"
heading = "## Document Index"
exclude_files = ["101_introduction.md", "SUMMARY.md"]

[checks.docs_semantic_drift]
enabled = true
docs_roots = ["docs"]
manifest_path = "Cargo.toml"
planned_crates = []
file_exemptions = []

[checks.formal_claim_scope]
enabled = true

[[checks.formal_claim_scope.files]]
path = "docs/claim.md"
required_literals = ["Current formal claim", "Claimed surface"]
forbidden_literals = ["end to end"]

[checks.parity_ledger]
enabled = true

[[checks.parity_ledger.files]]
path = "docs/parity.md"
required_literals = ["### Deviation Registry", "| ID | Status | Owner | Revisit | Summary |"]
forbidden_literals = []

[checks.durable_boundaries]
enabled = true

[[checks.durable_boundaries.required_patterns]]
pattern = "typed durable artifacts"
include_paths = ["docs/durable.md"]

[[checks.durable_boundaries.forbidden_patterns]]
pattern = "PersistedDurabilityArtifact"
include_paths = ["crates/viewer/src"]

[checks.search_boundaries]
enabled = true

[[checks.search_boundaries.required_patterns]]
pattern = "generic"
include_paths = ["docs/search.md"]

[[checks.search_boundaries.forbidden_patterns]]
pattern = "dioxus"
include_paths = ["crates/search/src"]

[checks.viewer_tooling_boundaries]
enabled = true

[[checks.viewer_tooling_boundaries.required_patterns]]
pattern = "telltale-viewer"
include_paths = ["docs/viewer.md"]

[[checks.viewer_tooling_boundaries.forbidden_patterns]]
pattern = "web_sys|js_sys|wasm_bindgen"
include_paths = ["crates/viewer/src"]

[checks.text_formatting]
enabled = true
include_paths = ["docs"]
exclude_path_parts = []

[checks.workspace_hygiene]
enabled = true
include_paths = ["crates"]
exclude_path_parts = []

[checks.crate_root_policy]
enabled = true
required_attributes = ["#![forbid(unsafe_code)]"]

[checks.ignored_result]
enabled = true
include_paths = ["crates"]
allowed_comment_markers = ["allow-ignored-result:"]

[checks.unsafe_boundary]
enabled = true
include_paths = ["crates"]
allowed_path_parts = ["/raw/"]
required_comment_markers = ["Safety:"]

[checks.bool_param]
enabled = true
include_paths = ["crates"]

[checks.must_use_public_return]
enabled = true
include_paths = ["crates"]

[checks.assert_shape]
enabled = true
include_paths = ["crates"]

[checks.drop_side_effects]
enabled = true
include_paths = ["crates"]
allow_comment_marker = "drop-side-effects-exception:"

[checks.recursion_guard]
enabled = true
include_paths = ["crates"]
allow_comment_marker = "recursion-exception:"

[checks.naming_units]
enabled = true
include_paths = ["crates"]

[checks.limit_constant]
enabled = true
include_paths = ["crates"]
allow_comment_marker = "limit-constant-exception:"

[checks.public_type_width]
enabled = true
include_paths = ["crates"]
banned_types = ["usize", "isize", "f32", "f64"]

[checks.dependency_policy]
enabled = true
manifest_roots = ["crates"]
require_default_features_false = ["serde"]
banned_dependencies = ["lazy_static"]

[checks.workflow_actions]
enabled = true
workflow_roots = [".github/workflows"]
pin_comment_markers = ["pin"]

[checks.unwrap_guard]
enabled = true
include_paths = ["crates"]
allow_comment_marker = "unwrap-safe:"

[checks.allow_attribute_guard]
enabled = true
include_paths = ["crates"]
allow_comment_marker = "allow-lint:"

[checks.doc_coverage]
enabled = true
include_paths = ["crates"]

[checks.cloning_boundary]
enabled = true
include_paths = ["crates"]
allow_comment_marker = "clone-allowed:"
banned_derives = ["Clone"]

[checks.fn_length]
enabled = true
include_paths = ["crates"]
warn_lines = 60
hard_lines = 100
allow_comment_marker = "long-fn-exception:"

[checks.lean_escape_hatches]
enabled = true
include_paths = ["lean"]
exclude_path_parts = []

[checks.lean_escape_hatches.kind_thresholds]
sorry = 0
axiom = 0
private_axiom = 0
unsafe = 0
partial_def = 0
empty_theorem_shell = 0
