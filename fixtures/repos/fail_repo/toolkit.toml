[workspace]
crate_roots = ["crates"]
exclude_crates = []

[checks.proc_macro_scope]
enabled = true
include_paths = ["crates"]
required_markers = ["#[public_model"]
exclude_files = []

[checks.result_must_use]
enabled = true
include_paths = ["crates/traits/src"]

[checks.test_boundaries]
enabled = true
scan_roots = ["crates"]
exclude_prefixes = []
exclude_path_parts = ["/tests/", "/benches/", "/examples/", "/target/"]

[checks.docs_link_check]
enabled = true
docs_roots = ["docs"]
scratch_dir_prefix = "work/"

[checks.docs_semantic_drift]
enabled = true
docs_roots = ["docs"]
manifest_path = "Cargo.toml"
planned_crates = []
file_exemptions = []

[checks.docs_prose_quality]
enabled = true
include_paths = ["docs"]
exclude_path_parts = []
ban_em_dash = true
ban_semicolon = true
require_explanatory_prose_after_code = true
require_prose_exceeds_code = true

[checks.text_formatting]
enabled = true
include_paths = ["docs"]
exclude_path_parts = []

[checks.workspace_hygiene]
enabled = true
include_paths = ["crates"]
exclude_path_parts = []

[checks.crate_root_policy]
enabled = true
required_attributes = ["#![forbid(unsafe_code)]"]

[checks.ignored_result]
enabled = true
include_paths = ["crates"]
allowed_comment_markers = ["allow-ignored-result:"]

[checks.unsafe_boundary]
enabled = true
include_paths = ["crates"]
allowed_path_parts = ["/raw/"]
required_comment_markers = ["Safety:"]

[checks.bool_param]
enabled = true
include_paths = ["crates"]

[checks.must_use_public_return]
enabled = true
include_paths = ["crates"]

[checks.assert_shape]
enabled = true
include_paths = ["crates"]

[checks.drop_side_effects]
enabled = true
include_paths = ["crates"]
allow_comment_marker = "drop-side-effects-exception:"

[checks.recursion_guard]
enabled = true
include_paths = ["crates"]
allow_comment_marker = "recursion-exception:"

[checks.naming_units]
enabled = true
include_paths = ["crates"]

[checks.limit_constant]
enabled = true
include_paths = ["crates"]
allow_comment_marker = "limit-constant-exception:"

[checks.public_type_width]
enabled = true
include_paths = ["crates"]
banned_types = ["usize", "isize", "f32", "f64"]

[checks.dependency_policy]
enabled = true
manifest_roots = ["crates"]
require_default_features_false = ["serde"]
banned_dependencies = ["lazy_static"]

[checks.workflow_actions]
enabled = true
workflow_roots = [".github/workflows"]
pin_comment_markers = ["pin"]

[checks.lean_escape_hatches]
enabled = true
include_paths = ["lean"]
exclude_path_parts = []

[checks.lean_escape_hatches.kind_thresholds]
sorry = 0
axiom = 0
private_axiom = 0
unsafe = 0
partial_def = 0
empty_theorem_shell = 0

[checks.lean_architecture]
enabled = true
include_paths = ["lean"]
exclude_path_parts = []
root_facade_files = ["lean/Facade.lean"]
legacy_projection_exempt_path_parts = ["/Projection/"]
theorempack_exempt_path_parts = ["/Examples/", "Artifacts.lean"]

[checks.workspace_layering]
enabled = true
manifest_path = "Cargo.toml"

[checks.workspace_layering.crate_layers]
fixture-core = 2
fixture-traits = 1

[checks.rust_architecture]
enabled = true
rust_roots = ["crates"]
determinism_runtime_paths = ["crates/traits/src/style.rs"]
determinism_test_paths = []
kernel_paths = ["crates/traits/src/style.rs"]
fixed_wrapper_paths = ["crates/traits/src/fixed_q32.rs"]
